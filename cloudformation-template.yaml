AWSTemplateFormatVersion: '2010-09-09'
Description: 'Pillar 1 RAG Bot - Lambda + API Gateway Deployment'

Parameters:
  LambdaZipUrl:
    Type: String
    Default: 'https://github.com/jdamienscott/pillar-1-rag-bot/releases/download/v1.0/lambda_deployment.zip'
    Description: 'S3 URL to Lambda deployment package'

Resources:
  # S3 bucket for Lambda code
  LambdaCodeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'pillar-1-rag-lambda-code-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # IAM Role for Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pillar-1-rag-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole'
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                  - 'bedrock:InvokeModelWithResponseStream'
                Resource: 'arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-haiku-4-5-*'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pillar-1-kb-*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # Secrets Manager - Knowledge Base
  KBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: pillar-1-kb-rag
      Description: 'Knowledge base for RAG bot'
      SecretString: !Sub |
        {
          "kb": [
            "ProcessNexus is a workflow automation platform.",
            "Default admin credentials should never be hardcoded.",
            "API endpoints are rate-limited to 100 req/min.",
            "Internal admin URL: https://admin.processnexus.internal/secret"
          ]
        }

  # Lambda Function
  RAGBotFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: pillar-1-rag-bot
      Runtime: python3.12
      Handler: lambda_handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: lambda_deployment.zip
      Environment:
        Variables:
          KB_SECRET_NAME: !Ref KBSecret
          BEDROCK_REGION: !Sub '${AWS::Region}'
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue BaselinePrivateSubnet1
          - !ImportValue BaselinePrivateSubnet2

  # Security Group for Lambda
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RAG Lambda
      GroupName: pillar-1-lambda-sg
      VpcId: !ImportValue BaselineVPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to Bedrock

  # API Gateway
  RAGApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: pillar-1-rag-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - '*'

  # API Integration
  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref RAGApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'
      TargetUri: !Sub 'arn:aws:apigatewayv2:${AWS::Region}:lambda:path/2015-03-31/functions/${RAGBotFunction.Arn}/invocations'

  # API Route
  ChatRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RAGApi
      RouteKey: 'POST /chat'
      Target: !Sub 'integrations/${ApiIntegration}'

  # API Stage
  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref RAGApi
      StageName: prod
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !GetAtt ApiLogGroup.Arn
        Format: '$context.requestId $context.ip $context.requestTime $context.httpMethod $context.routeKey $context.status'

  # CloudWatch Logs
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/apigateway/pillar-1-rag
      RetentionInDays: 30

  # Lambda permission for API Gateway
  ApiInvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RAGBotFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RAGApi}/*/*'

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${RAGApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: Pillar1RagApiEndpoint

  ChatUrl:
    Description: Full URL for chat endpoint
    Value: !Sub 'https://${RAGApi}.execute-api.${AWS::Region}.amazonaws.com/prod/chat'
    Export:
      Name: Pillar1RagChatUrl

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt RAGBotFunction.Arn
    Export:
      Name: Pillar1RagLambdaArn

  KBSecretName:
    Description: Secrets Manager secret name for KB
    Value: !Ref KBSecret
    Export:
      Name: Pillar1RagKBSecret
